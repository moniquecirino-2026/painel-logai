<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel LogAI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
  .container { max-width: 980px; margin: 0 auto; padding: 24px 16px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 12px; color: #888; margin-top: 3px; }
  .btn { padding: 7px 16px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 13px; cursor: pointer; transition: all .15s; }
  .btn:hover { background: #f0f0f0; }

  .nav-principal { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 2px solid #e8e8e8; }
  .nav-btn { padding: 10px 20px; border: none; background: none; font-size: 14px; font-weight: 500; color: #aaa; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
  .nav-btn:hover { color: #555; }
  .nav-btn.ativo { color: #7F77DD; border-bottom-color: #7F77DD; }

  /* FORMS */
  .forms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .form-card { background: white; border-radius: 12px; border: 1px solid #eee; padding: 18px; display: flex; flex-direction: column; gap: 10px; }
  .form-card-icon { font-size: 24px; }
  .form-card-nome { font-size: 15px; font-weight: 600; }
  .form-card-desc { font-size: 12px; color: #777; line-height: 1.6; flex: 1; }
  .form-card-link { display: inline-block; padding: 7px 16px; border-radius: 20px; border: 1px solid; text-decoration: none; font-size: 12px; font-weight: 600; text-align: center; transition: opacity .15s; }
  .form-card-link:hover { opacity: .8; }

  /* DIRECIONAMENTO */
  .secao-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .secao-titulo { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .08em; }
  .dir-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .dir-card { background: white; border-radius: 12px; border: 1px solid #eee; overflow: hidden; }
  .dir-card-header { padding: 11px 14px; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .dir-card-body { padding: 8px 14px 14px; }
  .dir-frente { margin-bottom: 10px; }
  .dir-frente:last-child { margin-bottom: 0; }
  .dir-frente-label { font-size: 10px; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; }
  .dir-frente-valor { font-size: 12px; color: #333; line-height: 1.5; }

  /* EXECUTIVO */
  .sec-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; font-weight: 600; }
  .funil-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; }
  .etapa { background: white; border: 1px solid #eee; border-radius: 12px; padding: 14px 12px; text-align: center; position: relative; cursor: pointer; transition: all .15s; }
  .etapa:hover { border-color: #ddd; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .etapa.aberta { border-width: 2px; }
  .etapa-top { height: 4px; border-radius: 4px 4px 0 0; position: absolute; top: 0; left: 0; right: 0; }
  .etapa-nome { font-size: 11px; color: #888; margin-bottom: 8px; }
  .etapa-num { font-size: 28px; font-weight: 600; line-height: 1; }
  .etapa-sub { font-size: 11px; color: #888; margin-top: 4px; }
  .etapa-conv { font-size: 10px; margin-top: 8px; padding: 3px 8px; border-radius: 20px; display: inline-block; }
  .etapa-hint { font-size: 10px; color: #bbb; margin-top: 8px; }

  .detalhe { display: none; border: 1px solid #eee; border-radius: 12px; padding: 20px; margin-bottom: 20px; background: white; }
  .detalhe.visivel { display: block; }
  .det-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .det-titulo { font-size: 16px; font-weight: 600; }
  .det-fechar { font-size: 11px; color: #888; cursor: pointer; padding: 3px 10px; border-radius: 20px; border: 1px solid #eee; }
  .det-fechar:hover { background: #f5f5f5; }

  .exec-grid { display: grid; gap: 14px; margin-bottom: 20px; align-items: start; }
  .exec-total { text-align: center; padding: 16px 24px; background: #f8f8f8; border-radius: 12px; }
  .exec-total-num { font-size: 48px; font-weight: 600; line-height: 1; }
  .exec-total-label { font-size: 12px; color: #888; margin-top: 4px; }
  .exec-bloco { background: #f8f8f8; border-radius: 12px; padding: 14px; }
  .exec-bloco-titulo { font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .exec-item { margin-bottom: 9px; }
  .exec-item:last-child { margin-bottom: 0; }
  .exec-item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
  .exec-item-label { font-size: 12px; color: #333; }
  .exec-item-val { font-size: 12px; font-weight: 600; }
  .exec-bar-bg { width: 100%; background: #e8e8e8; border-radius: 4px; height: 5px; }
  .exec-bar-fill { height: 5px; border-radius: 4px; }

  .divider { height: 1px; background: #f0f0f0; margin: 16px 0; }

  .listao-header { display: grid; gap: 8px; padding: 6px 8px; font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #eee; margin-bottom: 4px; }
  .listao-row { display: grid; gap: 8px; padding: 8px; border-radius: 8px; font-size: 12px; align-items: center; }
  .listao-row:hover { background: #fafafa; }

  .tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; display: inline-block; white-space: nowrap; }
  .tag-pos { background: #e1f5ee; color: #0f6e56; }
  .tag-neg { background: #faece7; color: #993c1d; }
  .tag-neu { background: #f1efe8; color: #5f5e5a; }
  .tag-sim { background: #eeedfe; color: #534ab7; }
  .tag-nao { background: #f1efe8; color: #5f5e5a; }
  .tag-and { background: #faeeda; color: #854f0b; }
  .tag-ok  { background: #e1f5ee; color: #0f6e56; }
  .link-meet { font-size: 11px; color: #185fa5; text-decoration: none; }
  .motivo-txt { font-size: 11px; color: #D85A30; font-style: italic; }

  .nuvens-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .nuvem-box { background: #f8f8f8; border-radius: 12px; padding: 14px; }
  .nuvem-titulo { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
  .nuvem { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .palavra { border-radius: 20px; padding: 3px 10px; font-weight: 600; cursor: default; }

  /* CLIENTES */
  .clientes-filtros { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .clientes-filtros input, .clientes-filtros select { padding: 7px 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; background: white; }
  .clientes-table-wrap { overflow-x: auto; background: white; border-radius: 12px; border: 1px solid #eee; }
  .clientes-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 700px; }
  .clientes-table th { padding: 10px 12px; text-align: left; font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #eee; white-space: nowrap; background: #fafafa; }
  .clientes-table td { padding: 9px 12px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
  .clientes-table tr:last-child td { border-bottom: none; }
  .clientes-table tr:hover td { background: #fafafa; }
  .etapa-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; margin: 1px; }
  .pill-sim { background: #eeedfe; color: #534ab7; }
  .pill-nao { background: #f1efe8; color: #bbb; }
  .clientes-resumo { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; }
  .res-card { background: white; border-radius: 10px; padding: 14px; text-align: center; border: 1px solid #eee; }
  .res-card .v { font-size: 24px; font-weight: 600; }
  .res-card .l { font-size: 11px; color: #888; margin-top: 3px; }

  .vazio { text-align: center; padding: 28px; color: #bbb; font-size: 13px; }

  @media (max-width: 600px) {
    .funil-row { grid-template-columns: repeat(2,1fr); }
    .exec-grid { grid-template-columns: 1fr !important; }
    .nuvens-grid { grid-template-columns: 1fr; }
    .clientes-resumo { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Painel LogAI</h1>
      <p id="ultima-atualizacao">Carregando...</p>
    </div>
    <button class="btn" onclick="carregar()">↻ Atualizar</button>
  </div>

  <div class="nav-principal">
    <button class="nav-btn ativo" onclick="setAba('forms')" id="nav-forms">Forms</button>
    <button class="nav-btn" onclick="setAba('dir')" id="nav-dir">Direcionamento</button>
    <button class="nav-btn" onclick="setAba('exec')" id="nav-exec">Executivo</button>
    <button class="nav-btn" onclick="setAba('clientes')" id="nav-clientes">Clientes</button>
  </div>

  <div id="pagina-forms"></div>
  <div id="pagina-dir" style="display:none"></div>
  <div id="pagina-exec" style="display:none"></div>
  <div id="pagina-clientes" style="display:none"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbydFzsnklxyH7_-9tNTma7D5PUZp-UdBrE13OXhXTaXIkdBlT-OtRiWS1I0G5oNYHwqcQ/exec";
const CORES = {"NCM":"#7F77DD","Finance":"#1D9E75","Shipment":"#D85A30","Export":"#BA7517","Trading":"#185FA5","México":"#993556","360":"#0F6E56","LogOS":"#534AB7","Logmanager":"#3C3489"};
const COR_ETAPAS = {potencial:"#993556",demo:"#7F77DD",migracao:"#BA7517",ativacao:"#185FA5"};
const ABAS = ["Espelho","Demo","Migração","Ativação","Clientes potenciais"];

const FORMS_INFO = [
  {nome:"Espelho",icone:"🪞",cor:"#1D9E75",url:"https://forms.gle/jQaG9qbDubF53z1i9",desc:"Todas as consultas que o time faz no produto legado e replica no LogAI."},
  {nome:"Demo",icone:"🤝",cor:"#7F77DD",url:"https://forms.gle/hweej1hHV8xaeoeq9",desc:"Preencher após cada demonstração do LogAI para um cliente."},
  {nome:"Migração",icone:"🔄",cor:"#BA7517",url:"https://forms.gle/ugKFwpVTR8Urr4DZA",desc:"Acompanhamento do processo de migração de clientes para o LogAI."},
  {nome:"Ativação",icone:"🚀",cor:"#185FA5",url:"https://forms.gle/CQRpx7TgGstv6iTTA",desc:"Acompanhamento semanal de clientes novos no LogAI."},
  {nome:"Clientes Potenciais",icone:"⭐",cor:"#993556",url:"https://forms.gle/bQ36EwQLjjoKQqdp8",desc:"Registrar clientes com potencial de migrar para o LogAI."},
];

const DIRECIONAMENTO_FIXO = {
  "13":{
    "NCM":{"Espelho":"• Guardião Key user deve realizar testes com foco em comparar resultados de preço.\n• Toda e qualquer pesquisa realizada no NCM (1.0, 2.0 e PRO) deve ser replicada no Log.AI.","Demo":"Realizar demo com clientes potenciais já selecionados.","Migração":"Migrar clientes do Basic.","Clientes Potenciais":"Incluir novos clientes potenciais."},
    "Finance":{"Demo":"Realizar demo com clientes já agendados.","Clientes Potenciais":"Incluir novos clientes potenciais."},
    "Shipment":{"Espelho":"Toda e qualquer pesquisa realizada no Shipment deve ser replicada no Log.AI.","Demo":"Realizar 10 agendas com clientes potenciais.","Clientes Potenciais":"Incluir novos clientes potenciais."},
    "Export":{"Espelho":"• Toda e qualquer pesquisa realizada no Export deve ser replicada no Log.AI.\n• Guardiões devem realizar testes com foco em comparar resultados de comprador e exportador.","Demo":"Realizar 05 agendas com clientes potenciais.","Clientes Potenciais":"Incluir novos clientes potenciais."},
    "México":{"Espelho":"Toda e qualquer pesquisa realizada nos produtos México deve ser replicada no Log.AI.","Ativação":"Ativar com os 15 novos clientes."}
  }
};

let dadosTodos = {};
let abaAtiva = "forms";
let etapaAberta = null;
let clientesBusca = "";
let clientesFiltroEtapa = "";

// ── UTILS ──────────────────────────────────────────────────
const COL_ID = {
  "Demo":"4. ID do cliente (Copiar exatamente como aparece no sistema de CS)",
  "Migração":"4. ID do Cliente",
  "Ativação":"ID do Cliente",
  "Clientes potenciais":"4. ID do Cliente"
};
const COL_NOME = {
  "Demo":"5. Nome do cliente (Copiar exatamente como aparece no sistema de CS)",
  "Migração":"5. Nome do Cliente",
  "Ativação":"Nome do Cliente",
  "Clientes potenciais":"5. Nome do Cliente"
};
const COL_PRODUTO = {
  "Demo":"6. Produto atual do cliente",
  "Migração":"6. Produto de origem (de onde está migrando)",
  "Ativação":"Agente contratado no Log.AI",
  "Clientes potenciais":"6. Produtos atuais do cliente"
};
const COL_AGENTE = {
  "Demo":"Qual agente foi demonstrado ao cliente no LogAI",
  "Migração":"Agente habilitado no LogAI para o cliente",
  "Ativação":"Agente contratado no Log.AI",
  "Clientes potenciais":"8. Agente do LogAI com potencial para este Cliente"
};

function getId(row, aba) { return (row[COL_ID[aba]]||"").trim().toUpperCase(); }
function getNome(row, aba) { return row[COL_NOME[aba]]||"—"; }
function getProduto(row, aba) { return row[COL_PRODUTO[aba]]||"—"; }
function getAgente(row, aba) { return row[COL_AGENTE[aba]]||"—"; }

async function buscarAba(aba) {
  const r = await fetch(`${API}?aba=${encodeURIComponent(aba)}`);
  const j = await r.json();
  return Array.isArray(j) ? j : [];
}

async function carregar() {
  document.getElementById("ultima-atualizacao").textContent = "Atualizando...";
  try {
    const res = await Promise.all(ABAS.map(a => buscarAba(a).catch(()=>[])));
    ABAS.forEach((a,i) => dadosTodos[a] = res[i]||[]);
    document.getElementById("ultima-atualizacao").textContent = `Atualizado às ${new Date().toLocaleTimeString("pt-BR")}`;
    renderAba();
  } catch(e) {
    document.getElementById("ultima-atualizacao").textContent = "Erro ao carregar";
  }
}

function setAba(aba) {
  abaAtiva = aba;
  ["forms","dir","exec","clientes"].forEach(a => {
    document.getElementById(`pagina-${a}`).style.display = a===aba?"block":"none";
    document.getElementById(`nav-${a}`).classList.toggle("ativo", a===aba);
  });
  renderAba();
}

function renderAba() {
  if (abaAtiva==="forms") renderForms();
  else if (abaAtiva==="dir") renderDirecionamento();
  else if (abaAtiva==="exec") renderExecutivo();
  else if (abaAtiva==="clientes") renderClientes();
}

// ── FORMS ──────────────────────────────────────────────────
function renderForms() {
  document.getElementById("pagina-forms").innerHTML = `<div class="forms-grid">${FORMS_INFO.map(f=>`
    <div class="form-card" style="border-top:3px solid ${f.cor}">
      <div class="form-card-icon">${f.icone}</div>
      <div class="form-card-nome">${f.nome}</div>
      <div class="form-card-desc">${f.desc}</div>
      <a href="${f.url}" target="_blank" class="form-card-link" style="border-color:${f.cor};color:${f.cor};background:${f.cor}12">Abrir form →</a>
    </div>`).join("")}</div>`;
}

// ── DIRECIONAMENTO ──────────────────────────────────────────
function setSemana(s) { document.getElementById("pagina-dir").dataset.semAtiva=s; renderDirecionamento(); }
function renderDirecionamento() {
  const el = document.getElementById("pagina-dir");
  const sems = Object.keys(DIRECIONAMENTO_FIXO).sort((a,b)=>Number(b)-Number(a));
  const sa = el.dataset.semAtiva||sems[0];
  el.dataset.semAtiva = sa;
  const prod = DIRECIONAMENTO_FIXO[sa]||{};
  el.innerHTML = `
    <div class="secao-header"><span class="secao-titulo">Direcionamento da semana</span></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
      ${sems.map(s=>`<button onclick="setSemana('${s}')" style="padding:5px 16px;border-radius:20px;border:1px solid;cursor:pointer;font-size:13px;${s===sa?'border-color:#7F77DD;background:#7F77DD22;color:#7F77DD;font-weight:600':'border-color:#ddd;background:white;color:#888'}">Semana ${s}</button>`).join("")}
    </div>
    <div class="dir-grid">${Object.entries(prod).map(([p,frentes])=>{
      const c=CORES[p]||"#7F77DD";
      return `<div class="dir-card">
        <div class="dir-card-header" style="background:${c}12;border-bottom:2px solid ${c}">
          <span style="width:9px;height:9px;border-radius:50%;background:${c};display:inline-block;flex-shrink:0"></span>${p}
        </div>
        <div class="dir-card-body">${Object.entries(frentes).map(([f,o])=>`
          <div class="dir-frente">
            <div class="dir-frente-label"><span>${f}</span>${f==="Clientes Potenciais"?`<span style="font-size:9px;padding:1px 7px;border-radius:20px;background:#f0f0f0;color:#aaa;font-weight:600">CONTÍNUO</span>`:""}</div>
            <div class="dir-frente-valor">${o.replace(/\n/g,"<br>")}</div>
          </div>`).join("")}
        </div>
      </div>`;
    }).join("")}</div>`;
}

// ── EXECUTIVO ───────────────────────────────────────────────
function renderExecutivo() {
  const el = document.getElementById("pagina-exec");
  const idsPot  = new Set((dadosTodos["Clientes potenciais"]||[]).map(r=>getId(r,"Clientes potenciais")).filter(Boolean));
  const idsDemo = new Set((dadosTodos["Demo"]||[]).map(r=>getId(r,"Demo")).filter(Boolean));
  const idsMig  = new Set((dadosTodos["Migração"]||[]).map(r=>getId(r,"Migração")).filter(Boolean));
  const idsAtiv = new Set((dadosTodos["Ativação"]||[]).map(r=>getId(r,"Ativação")).filter(Boolean));
  const convDemo = idsPot.size>0 ? Math.round([...idsDemo].filter(id=>idsPot.has(id)).length/idsPot.size*100) : 0;
  const convMig  = idsDemo.size>0 ? Math.round([...idsMig].filter(id=>idsDemo.has(id)).length/idsDemo.size*100) : 0;
  const convAtiv = idsMig.size>0 ? Math.round([...idsAtiv].filter(id=>idsMig.has(id)).length/idsMig.size*100) : 0;

  el.innerHTML = `
    <div class="sec-label">funil de clientes — clique em uma etapa para detalhar</div>
    <div class="funil-row">
      ${etapaCard("potencial","Potenciais",idsPot.size,"clientes únicos","","","",etapaAberta==="potencial"?"▴":"▾")}
      ${etapaCard("demo","Demo",idsDemo.size,"clientes únicos",convDemo>0?`${convDemo}% dos potenciais`:"","#EEEDFE","#534AB7",etapaAberta==="demo"?"▴":"▾")}
      ${etapaCard("migracao","Migração",idsMig.size,"clientes únicos",convMig>0?`${convMig}% das demos`:"","#FAEEDA","#854F0B",etapaAberta==="migracao"?"▴":"▾")}
      ${etapaCard("ativacao","Ativação",idsAtiv.size,"clientes únicos",convAtiv>0?`${convAtiv}% das migrações`:"","#E6F1FB","#0C447C",etapaAberta==="ativacao"?"▴":"▾")}
    </div>
    <div id="detalhe-container"></div>`;

  if (etapaAberta) renderDetalhe(etapaAberta);
}

function etapaCard(id, nome, num, sub, conv, convBg, convCor, hint) {
  const c = COR_ETAPAS[id];
  const ab = etapaAberta===id;
  return `<div class="etapa${ab?" aberta":""}" onclick="toggleEtapa('${id}')" style="${ab?`border-color:${c};border-width:2px`:''}">
    <div class="etapa-top" style="background:${c}"></div>
    <div class="etapa-nome">${nome}</div>
    <div class="etapa-num" style="color:${c}">${num}</div>
    <div class="etapa-sub">${sub}</div>
    ${conv?`<div class="etapa-conv" style="background:${convBg};color:${convCor}">${conv}</div>`:""}
    <div class="etapa-hint">${hint}</div>
  </div>`;
}

function toggleEtapa(id) {
  etapaAberta = etapaAberta===id ? null : id;
  renderExecutivo();
}

function renderDetalhe(id) {
  const c = COR_ETAPAS[id];
  const nomes = {potencial:"Potenciais",demo:"Demo",migracao:"Migração",ativacao:"Ativação"};
  const html = id==="demo" ? renderDetalheDemo(c)
             : id==="potencial" ? renderDetalhePotencial(c)
             : id==="migracao" ? renderDetalheMigracao(c)
             : renderDetalheAtivacao(c);
  document.getElementById("detalhe-container").innerHTML = `
    <div class="detalhe visivel">
      <div class="det-header">
        <div class="det-titulo" style="color:${c}">${nomes[id]}</div>
        <div class="det-fechar" onclick="toggleEtapa('${id}')">fechar ✕</div>
      </div>
      ${html}
    </div>`;
}

// ── DETALHE DEMO ───────────────────────────────────────────
function renderDetalheDemo(cor) {
  const rows = dadosTodos["Demo"]||[];
  if (!rows.length) return '<div class="vazio">Nenhuma demo registrada ainda.</div>';
  const total = rows.length;
  const pos  = rows.filter(r=>r["8. Percepção geral do cliente em relação ao LogAI"]==="Positiva").length;
  const neg  = rows.filter(r=>r["8. Percepção geral do cliente em relação ao LogAI"]==="Negativa").length;
  const neu  = total-pos-neg;
  const sim  = rows.filter(r=>r["12. Cliente quer avançar?"]==="Sim").length;
  const nao  = rows.filter(r=>r["12. Cliente quer avançar?"]==="Não").length;
  const txtPos = rows.filter(r=>r["8. Percepção geral do cliente em relação ao LogAI"]==="Positiva").map(r=>r["9. O que o cliente disse (Principais comentários, dúvidas e pontos de atenção)"]||"").join(" ");
  const txtNeg = rows.map(r=>r["10. Cliente sentiu falta de alguma coisa no LogAI?"]||"").join(" ")+" "+rows.filter(r=>r["12. Cliente quer avançar?"]==="Não").map(r=>r["Se não, descreva o motivo"]||"").join(" ");
  const gc = "grid-template-columns:2fr 1fr 1fr 1.5fr 1fr";
  return `
    <div class="exec-grid" style="grid-template-columns:auto 1fr 1fr">
      <div class="exec-total"><div class="exec-total-num" style="color:${cor}">${total}</div><div class="exec-total-label">demos realizadas</div></div>
      <div class="exec-bloco"><div class="exec-bloco-titulo">Percepção do cliente</div>${execItem("Positiva","#1D9E75",pos,total)}${execItem("Neutra","#BA7517",neu,total)}${execItem("Negativa","#D85A30",neg,total)}</div>
      <div class="exec-bloco"><div class="exec-bloco-titulo">Quer avançar?</div>${execItem("Sim","#7F77DD",sim,total)}${execItem("Não","#888",nao,total)}</div>
    </div>
    <div class="divider"></div>
    <div class="sec-label" style="margin-bottom:8px">listão de clientes</div>
    <div class="listao-header" style="${gc}"><div>nome</div><div>percepção</div><div>avançar?</div><div>motivo (se não)</div><div>gravação</div></div>
    ${rows.map(r=>{
      const perc=r["8. Percepção geral do cliente em relação ao LogAI"]||"—";
      const av=r["12. Cliente quer avançar?"]||"—";
      const mot=r["Se não, descreva o motivo"]||"";
      const link=r["13. Link da gravação Meetrox (se houver)"]||"";
      return `<div class="listao-row" style="${gc}">
        <div style="font-weight:500">${getNome(r,"Demo")}</div>
        <div><span class="tag ${perc==="Positiva"?"tag-pos":perc==="Negativa"?"tag-neg":"tag-neu"}">${perc}</span></div>
        <div><span class="tag ${av==="Sim"?"tag-sim":"tag-nao"}">${av}</span></div>
        <div class="motivo-txt">${av==="Não"&&mot?mot:"—"}</div>
        <div>${link?`<a class="link-meet" href="${link}" target="_blank">ver gravação</a>`:"—"}</div>
      </div>`;
    }).join("")}
    <div class="divider"></div>
    <div class="sec-label" style="margin-bottom:8px">evidências qualitativas</div>
    <div class="nuvens-grid">
      <div class="nuvem-box"><div class="nuvem-titulo" style="color:#0f6e56">o que agradou</div><div class="nuvem">${gerarNuvem(txtPos,"pos")}</div></div>
      <div class="nuvem-box"><div class="nuvem-titulo" style="color:#993c1d">o que faltou / pontos negativos</div><div class="nuvem">${gerarNuvem(txtNeg,"neg")}</div></div>
    </div>`;
}

      <div class="exec-bloco"><div class="exec-bloco-titulo">Agenda marcada</div>${execItem("Com agenda","#1D9E75",comAgenda,rows.length)}${execItem("Sem agenda","#888",rows.length-comAgenda,rows.length)}</div>

// ── ABA CLIENTES ───────────────────────────────────────────
function renderClientes() {
  const el = document.getElementById("pagina-clientes");

  // Monta mapa de clientes cruzando todas as abas pelo ID
  const mapa = {};

  const registrar = (aba, row) => {
    const id = getId(row, aba);
    if (!id) return;
    if (!mapa[id]) mapa[id] = {id, nome:"—", produto:"—", agente:"—", potencial:false, demo:false, migracao:false, ativacao:false, statusMig:"—", statusAtiv:"—"};
    const c = mapa[id];
    const nome = getNome(row, aba);
    if (nome && nome !== "—") c.nome = nome;
    const prod = getProduto(row, aba);
    if (prod && prod !== "—") c.produto = prod;
    const ag = getAgente(row, aba);
    if (ag && ag !== "—") c.agente = ag;
    if (aba==="Potenciais") c.potencial = true;
    if (aba==="Demo") c.demo = true;
    if (aba==="Migração") { c.migracao = true; c.statusMig = row["9. Status da migração"]||"—"; }
    if (aba==="Ativação") { c.ativacao = true; c.statusAtiv = row["Ativou o produto Log.AI?"]||"—"; }
  };

  ["Clientes potenciais","Demo","Migração","Ativação"].forEach(aba => (dadosTodos[aba]||[]).forEach(r => registrar(aba, r)));

  let clientes = Object.values(mapa);

  // Cards resumo
  const total = clientes.length;
  const soPot = clientes.filter(c=>c.potencial&&!c.demo&&!c.migracao&&!c.ativacao).length;
  const emMig = clientes.filter(c=>c.migracao&&!c.ativacao).length;
  const ativados = clientes.filter(c=>c.ativacao).length;

  el.innerHTML = `
    <div class="clientes-resumo">
      <div class="res-card"><div class="v">${total}</div><div class="l">clientes únicos</div></div>
      <div class="res-card"><div class="v" style="color:#993556">${soPot}</div><div class="l">só em potenciais</div></div>
      <div class="res-card"><div class="v" style="color:#BA7517">${emMig}</div><div class="l">em migração</div></div>
      <div class="res-card"><div class="v" style="color:#185FA5">${ativados}</div><div class="l">ativados</div></div>
    </div>
    <div class="clientes-filtros">
      <input type="text" id="busca-cliente" placeholder="🔍 Buscar por nome ou ID..." oninput="filtrarClientes()" style="min-width:220px"/>
      <select id="filtro-etapa" onchange="filtrarClientes()">
        <option value="">Todas as etapas</option>
        <option value="potencial">Potenciais</option>
        <option value="demo">Demo</option>
        <option value="migracao">Migração</option>
        <option value="ativacao">Ativação</option>
      </select>
      <select id="filtro-agente" onchange="filtrarClientes()">
        <option value="">Todos os agentes</option>
        ${[...new Set(clientes.map(c=>c.agente).filter(a=>a&&a!=="—"))].sort().map(a=>`<option>${a}</option>`).join("")}
      </select>
    </div>
    <div id="clientes-table-wrap"></div>`;

  renderTabelaClientes(clientes);
}

function filtrarClientes() {
  const busca = document.getElementById("busca-cliente").value.toLowerCase();
  const etapa = document.getElementById("filtro-etapa").value;
  const agente = document.getElementById("filtro-agente").value;

  const mapa = {};
  const registrar = (aba, row) => {
    const id = getId(row, aba);
    if (!id) return;
    if (!mapa[id]) mapa[id] = {id, nome:"—", produto:"—", agente:"—", potencial:false, demo:false, migracao:false, ativacao:false, statusMig:"—", statusAtiv:"—"};
    const c = mapa[id];
    const nome = getNome(row, aba); if (nome&&nome!=="—") c.nome=nome;
    const prod = getProduto(row, aba); if (prod&&prod!=="—") c.produto=prod;
    const ag = getAgente(row, aba); if (ag&&ag!=="—") c.agente=ag;
    if (aba==="Potenciais") c.potencial=true;
    if (aba==="Demo") c.demo=true;
    if (aba==="Migração") { c.migracao=true; c.statusMig=row["9. Status da migração"]||"—"; }
    if (aba==="Ativação") { c.ativacao=true; c.statusAtiv=row["Ativou o produto Log.AI?"]||"—"; }
  };
  ["Potenciais","Demo","Migração","Ativação"].forEach(aba=>(dadosTodos[aba]||[]).forEach(r=>registrar(aba,r)));
  let clientes = Object.values(mapa);

  if (busca) clientes = clientes.filter(c=>(c.nome+c.id).toLowerCase().includes(busca));
  if (etapa) clientes = clientes.filter(c=>c[etapa]);
  if (agente) clientes = clientes.filter(c=>c.agente===agente);
  renderTabelaClientes(clientes);
}

function renderTabelaClientes(clientes) {
  const wrap = document.getElementById("clientes-table-wrap");
  if (!clientes.length) { wrap.innerHTML='<div class="vazio">Nenhum cliente encontrado.</div>'; return; }
  const pill = (ativo, label, cor) => ativo
    ? `<span class="etapa-pill pill-sim" style="background:${cor}18;color:${cor}">${label}</span>`
    : `<span class="etapa-pill pill-nao">${label}</span>`;
  wrap.innerHTML = `
    <div class="clientes-table-wrap">
      <table class="clientes-table">
        <thead><tr>
          <th>ID</th><th>Nome</th><th>Produto</th><th>Agente LogAI</th>
          <th>Potencial</th><th>Demo</th><th>Migração</th><th>Ativação</th>
        </tr></thead>
        <tbody>${clientes.map(c=>`<tr>
          <td style="color:#888;font-size:11px">${c.id}</td>
          <td style="font-weight:500">${c.nome}</td>
          <td>${c.produto}</td>
          <td>${c.agente}</td>
          <td>${pill(c.potencial,"Potencial","#993556")}</td>
          <td>${pill(c.demo,"Demo","#7F77DD")}</td>
          <td>${c.migracao?`${pill(true,"Migração","#BA7517")}<br><span style="font-size:10px;color:#888">${c.statusMig}</span>`:pill(false,"Migração","#BA7517")}</td>
          <td>${c.ativacao?`${pill(true,"Ativação","#185FA5")}<br><span style="font-size:10px;color:#888">${c.statusAtiv}</span>`:pill(false,"Ativação","#185FA5")}</td>
        </tr>`).join("")}</tbody>
      </table>
    </div>
    <div style="font-size:11px;color:#aaa;margin-top:8px;padding:4px 0">${clientes.length} cliente${clientes.length!==1?"s":""} encontrado${clientes.length!==1?"s":""}</div>`;
}

// ── HELPERS ────────────────────────────────────────────────
function execItem(label, cor, val, total) {
  const pct = total>0 ? Math.round(val/total*100) : 0;
  return `<div class="exec-item">
    <div class="exec-item-row"><span class="exec-item-label">${label}</span><span class="exec-item-val" style="color:${cor}">${pct}%</span></div>
    <div class="exec-bar-bg"><div class="exec-bar-fill" style="width:${pct}%;background:${cor}"></div></div>
  </div>`;
}

function gerarNuvem(texto, tipo) {
  const stop = new Set(["de","a","o","e","que","é","do","da","em","um","para","com","uma","os","no","se","na","por","mais","as","dos","como","mas","foi","ao","ele","das","tem","à","seu","sua","ou","ser","quando","muito","há","nos","já","também","só","pelo","pela","até","isso","ela","entre","era","depois","sem","mesmo","aos","ter","seus","quem","nas","me","esse","eles","estão","você","tinha","foram","essa","num","nem","suas","meu","às","minha","têm","numa","pelos","pelas","qual","nós","lhe","deles","essas","esses","pois","agora","aqui","bem","não","sim","the","and","for","are","but","was","with","they","this","have","from","not","that","been"]);
  const freq = {};
  texto.toLowerCase().replace(/[^a-záéíóúãõâêîôûàèìòùç\s]/g,"").split(/\s+/)
    .filter(w=>w.length>3&&!stop.has(w))
    .forEach(w=>freq[w]=(freq[w]||0)+1);
  const sorted = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,14);
  if (!sorted.length) return '<span style="font-size:12px;color:#bbb">Sem dados suficientes</span>';
  const max = sorted[0][1];
  const paletas = {
    pos:[["#9FE1CB","#085041"],["#C0DD97","#27500A"],["#E1F5EE","#0F6E56"]],
    neg:[["#F5C4B3","#712B13"],["#F0997B","#4A1B0C"],["#FAECE7","#993C1D"]],
    pot:[["#CECBF6","#26215C"],["#AFA9EC","#3C3489"],["#EEEDFE","#534AB7"]]
  };
  const pal = paletas[tipo]||paletas.pot;
  return sorted.map(([w,n])=>{
    const sz = 11+Math.round((n/max)*10);
    const [bg,tc] = pal[Math.min(2,Math.floor((1-n/max)*3))];
    return `<span class="palavra" style="font-size:${sz}px;background:${bg};color:${tc}">${w}</span>`;
  }).join("");
}

carregar();
</script>
