<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel LogAI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header p { font-size: 13px; color: #666; margin-top: 4px; }
  .header-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { padding: 7px 16px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 13px; cursor: pointer; transition: all .15s; }
  .btn:hover { background: #f0f0f0; }
  .btn-primary { background: #7F77DD; color: white; border-color: #7F77DD; }
  .btn-primary:hover { background: #6b63c8; }
  .btn-danger { background: #D85A30; color: white; border-color: #D85A30; }
  .filtros { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .filtro-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 13px; cursor: pointer; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 6px 16px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 13px; cursor: pointer; }
  .resumo { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .resumo-card { background: white; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #eee; }
  .resumo-card .val { font-size: 26px; font-weight: 600; }
  .resumo-card .lbl { font-size: 12px; color: #888; margin-top: 4px; }
  .card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 14px; border: 1px solid #eee; }
  .card-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px; }
  .nums { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .num-btn { text-align: center; cursor: pointer; padding: 10px 6px; border-radius: 8px; border: 1px solid transparent; transition: all .15s; }
  .num-btn:hover { background: #f5f5f5; }
  .num-btn.ativo { border-color: currentColor; }
  .num-btn .v { font-size: 26px; font-weight: 600; }
  .num-btn .l { font-size: 11px; color: #888; margin-top: 2px; }
  .num-btn .d { font-size: 10px; color: #aaa; margin-top: 1px; }
  .barra-wrap { display: flex; align-items: center; gap: 10px; }
  .barra-bg { flex: 1; background: #f0f0f0; border-radius: 4px; height: 8px; }
  .barra-fill { height: 8px; border-radius: 4px; transition: width .4s; }
  .barra-pct { font-size: 12px; color: #888; min-width: 36px; }
  .insight { margin-top: 12px; padding: 10px 14px; background: #f8f8f8; border-radius: 8px; font-size: 12px; color: #555; }
  .insight strong { color: #1a1a1a; }
  .tabela-wrap { overflow-x: auto; margin-top: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { text-align: left; padding: 6px 8px; border-bottom: 1px solid #eee; color: #888; font-weight: 500; white-space: nowrap; }
  td { padding: 7px 8px; border-bottom: 1px solid #eee; vertical-align: top; max-width: 200px; word-break: break-word; }
  tr:nth-child(even) { background: #fafafa; }
  .loading { text-align: center; padding: 48px; color: #888; font-size: 14px; }
  .erro { padding: 16px; background: #fff3f3; border: 1px solid #fcc; border-radius: 10px; font-size: 13px; color: #c00; margin-bottom: 16px; }
  .vazio { text-align: center; padding: 32px; color: #aaa; font-size: 13px; }
  /* Direcionamento */
  .foco-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .foco-card { background: white; border-radius: 12px; border: 1px solid #eee; overflow: hidden; }
  .foco-card-header { padding: 12px 16px; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .foco-card-body { padding: 0 16px 14px; }
  .foco-frente { margin-bottom: 10px; }
  .foco-frente-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .foco-frente-valor { font-size: 13px; color: #333; line-height: 1.5; }
  .foco-frente-vazio { font-size: 13px; color: #bbb; font-style: italic; }
  .foco-frente-input { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 6px 8px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 60px; margin-top: 2px; }
  .foco-frente-input:focus { outline: none; border-color: #7F77DD; }
  .semana-badge { font-size: 11px; padding: 2px 10px; border-radius: 20px; background: #f0f0f0; color: #666; margin-left: auto; }
  .historico-item { padding: 10px 14px; border-bottom: 1px solid #eee; font-size: 12px; }
  .historico-item:last-child { border-bottom: none; }
  .historico-data { color: #888; margin-bottom: 4px; }
  .salvo-badge { display: inline-block; background: #1D9E7522; color: #1D9E75; padding: 2px 10px; border-radius: 20px; font-size: 12px; margin-left: 8px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Painel LogAI</h1>
      <p id="ultima-atualizacao">Carregando dados...</p>
    </div>
    <div class="header-btns">
      <button class="btn" onclick="carregar()">↻ Atualizar</button>
    </div>
  </div>

  <div class="filtros" id="filtros-produto"></div>
  <div class="tabs" id="tabs-frente"></div>
  <div id="resumo" class="resumo"></div>
  <div id="conteudo"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbydFzsnklxyH7_-9tNTma7D5PUZp-UdBrE13OXhXTaXIkdBlT-OtRiWS1I0G5oNYHwqcQ/exec";
const CORES = { NCM:"#7F77DD", Finance:"#1D9E75", Shipment:"#D85A30", Export:"#BA7517", Trading:"#185FA5", "México":"#D85A30", "360":"#0F6E56", LogOS:"#993556", Logmanager:"#534AB7" };
const COR_DEF = "#7F77DD";
const ABAS = ["Espelho","Direcionamento","Demo","Migração","Ativação"];
const PRODUTOS_LISTA = ["NCM","Finance","Shipment","Export","Trading","México","360","LogOS","Logmanager"];
const FRENTES_FOCO = ["Espelho","Demo","Migração"];

let dadosTodos = {};
let focoAtual = {}; // { produto: { frente: objetivo } }
let focoHistorico = [];
let modoEdicao = false;
let produtoAtivo = "Todos";
let frenteAtiva = "Espelho";
let detalheAberto = null;
let salvando = false;

function getCor(p) { return CORES[p] || COR_DEF; }

async function buscarAba(aba) {
  const r = await fetch(`${API}?aba=${encodeURIComponent(aba)}`);
  const json = await r.json();
  return Array.isArray(json) ? json : [];
}

async function carregar() {
  document.getElementById("ultima-atualizacao").textContent = "Atualizando...";
  document.getElementById("conteudo").innerHTML = '<div class="loading">Carregando dados...</div>';
  try {
    const resultados = await Promise.all(ABAS.map(a => buscarAba(a).catch(() => [])));
    ABAS.forEach((a, i) => dadosTodos[a] = resultados[i] || []);

    // Carregar foco do Sheets
    const focoRows = dadosTodos["Direcionamento"] || [];
    focoAtual = {};
    focoHistorico = [];
    focoRows.forEach(r => {
      const prod = r["Produto"];
      const frente = r["Frente"];
      const obj = r["Objetivo"];
      const data = r["Data"];
      if (prod && frente && obj) {
        if (!focoAtual[prod]) focoAtual[prod] = {};
        focoAtual[prod][frente] = obj;
        focoHistorico.push({ produto: prod, frente, objetivo: obj, data });
      }
    });

    document.getElementById("ultima-atualizacao").textContent = `Atualizado às ${new Date().toLocaleTimeString("pt-BR")}`;
    renderFiltros();
    renderTabs();
    renderConteudo();
  } catch(e) {
    document.getElementById("conteudo").innerHTML = `<div class="erro">⚠️ Erro ao carregar. Verifique sua conexão.</div>`;
    document.getElementById("ultima-atualizacao").textContent = "Erro ao atualizar";
  }
}

async function salvarFoco() {
  if (salvando) return;
  salvando = true;
  const btnSalvar = document.getElementById("btn-salvar");
  if (btnSalvar) btnSalvar.textContent = "Salvando...";

  // Coletar valores dos inputs
  const novoFoco = {};
  PRODUTOS_LISTA.forEach(prod => {
    FRENTES_FOCO.forEach(frente => {
      const el = document.getElementById(`foco-${prod}-${frente}`);
      if (el && el.value.trim()) {
        if (!novoFoco[prod]) novoFoco[prod] = {};
        novoFoco[prod][frente] = el.value.trim();
      }
    });
  });

  // Construir array para o Sheets — cada linha é produto+frente+objetivo+data
  const agora = new Date().toLocaleDateString("pt-BR");
  const linhas = [];
  
  // Manter histórico existente
  focoHistorico.forEach(h => {
    // Verificar se esse produto+frente foi alterado
    const novoObj = novoFoco[h.produto] && novoFoco[h.produto][h.frente];
    if (!novoObj || novoObj === h.objetivo) {
      linhas.push({ Produto: h.produto, Frente: h.frente, Objetivo: h.objetivo, Data: h.data });
    }
  });

  // Adicionar novos ou alterados
  Object.entries(novoFoco).forEach(([prod, frentes]) => {
    Object.entries(frentes).forEach(([frente, obj]) => {
      const existente = focoHistorico.find(h => h.produto === prod && h.frente === frente && h.objetivo === obj);
      if (!existente) {
        linhas.push({ Produto: prod, Frente: frente, Objetivo: obj, Data: agora });
      }
    });
  });

  try {
    await fetch(API, {
      method: "POST",
      body: JSON.stringify({ aba: "Direcionamento", dados: linhas })
    });
    focoAtual = novoFoco;
    focoHistorico = linhas.map(l => ({ produto: l.Produto, frente: l.Frente, objetivo: l.Objetivo, data: l.Data }));
    modoEdicao = false;
    salvando = false;
    renderConteudo();
  } catch(e) {
    salvando = false;
    if (btnSalvar) btnSalvar.textContent = "Erro ao salvar";
  }
}

function getProdutos() {
  const todos = new Set();
  Object.values(dadosTodos).forEach(rows => rows.forEach(r => { if(r["Produto"]) todos.add(r["Produto"]); }));
  return ["Todos", ...todos];
}

function filtrarPorProduto(rows) {
  if (produtoAtivo === "Todos") return rows;
  return rows.filter(r => r["Produto"] === produtoAtivo);
}

function renderFiltros() {
  document.getElementById("filtros-produto").innerHTML = getProdutos().map(p => {
    const c = getCor(p);
    const at = p === produtoAtivo;
    return `<button class="filtro-btn" onclick="setProduto('${p}')"
      style="${at ? `border-color:${c};background:${c}22;color:${c};font-weight:500` : ''}">${p}</button>`;
  }).join("");
}

function renderTabs() {
  document.getElementById("tabs-frente").innerHTML = ABAS.map(a => {
    const at = a === frenteAtiva;
    const c = getCor(produtoAtivo === "Todos" ? "NCM" : produtoAtivo);
    return `<button class="tab" onclick="setFrente('${a}')"
      style="${at ? `border-color:${c};background:${c}22;color:${c};font-weight:500` : ''}">${a}</button>`;
  }).join("");
}

function setProduto(p) { produtoAtivo = p; detalheAberto = null; modoEdicao = false; renderFiltros(); renderTabs(); renderConteudo(); }
function setFrente(f) { frenteAtiva = f; detalheAberto = null; modoEdicao = false; renderTabs(); renderConteudo(); }

function renderConteudo() {
  const rows = filtrarPorProduto(dadosTodos[frenteAtiva] || []);
  const cor = getCor(produtoAtivo === "Todos" ? "NCM" : produtoAtivo);
  let html = "";

  if (frenteAtiva === "Espelho") html = renderEspelho(rows, cor);
  else if (frenteAtiva === "Direcionamento") html = renderDirecionamento(cor);
  else if (frenteAtiva === "Demo") html = renderDemo(rows, cor);
  else if (frenteAtiva === "Migração") html = renderMigracao(rows, cor);
  else if (frenteAtiva === "Ativação") html = renderAtivacao(rows, cor);

  const total = rows.length;
  const produtosNaFrente = new Set(rows.map(r => r["Produto"]).filter(Boolean)).size;
  const totalGeral = produtoAtivo === "Todos"
    ? Object.values(dadosTodos).reduce((a,b) => a + b.length, 0)
    : Object.values(dadosTodos).reduce((a,b) => a + b.filter(r => r["Produto"] === produtoAtivo).length, 0);

  if (frenteAtiva !== "Direcionamento") {
    document.getElementById("resumo").innerHTML = `
      <div class="resumo-card"><div class="val">${total}</div><div class="lbl">Registros nesta frente</div></div>
      <div class="resumo-card"><div class="val" style="color:${cor}">${produtosNaFrente}</div><div class="lbl">Produtos nesta frente</div></div>
      <div class="resumo-card"><div class="val">${totalGeral}</div><div class="lbl">Total em todas as frentes</div></div>
    `;
  } else {
    document.getElementById("resumo").innerHTML = "";
  }

  document.getElementById("conteudo").innerHTML = html || '<div class="vazio">Nenhum registro ainda para este filtro.</div>';
}

function renderDirecionamento(cor) {
  const produtosFiltrados = produtoAtivo === "Todos" ? PRODUTOS_LISTA : [produtoAtivo];
  const temFoco = produtosFiltrados.some(p => focoAtual[p] && Object.keys(focoAtual[p]).length > 0);

  if (modoEdicao) {
    return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div style="font-size:14px;font-weight:600">Editando foco da semana</div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="modoEdicao=false;renderConteudo()">Cancelar</button>
        <button class="btn btn-primary" id="btn-salvar" onclick="salvarFoco()">Salvar</button>
      </div>
    </div>
    <div class="foco-grid">
      ${produtosFiltrados.map(prod => {
        const c = getCor(prod);
        return `<div class="foco-card">
          <div class="foco-card-header" style="background:${c}15;border-bottom:2px solid ${c}">
            <span style="width:10px;height:10px;border-radius:50%;background:${c};display:inline-block"></span>
            ${prod}
          </div>
          <div class="foco-card-body" style="padding-top:12px">
            ${FRENTES_FOCO.map(frente => `
              <div class="foco-frente">
                <div class="foco-frente-label">${frente}</div>
                <textarea class="foco-frente-input" id="foco-${prod}-${frente}" placeholder="Qual o objetivo para ${frente} esta semana?">${(focoAtual[prod] && focoAtual[prod][frente]) || ""}</textarea>
              </div>
            `).join("")}
          </div>
        </div>`;
      }).join("")}
    </div>`;
  }

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div style="font-size:14px;font-weight:600">Foco da semana</div>
    <button class="btn btn-primary" onclick="modoEdicao=true;renderConteudo()">✏️ Editar foco</button>
  </div>
  ${!temFoco ? `<div class="vazio">Nenhum foco definido ainda. Clique em "Editar foco" para começar.</div>` : `
  <div class="foco-grid">
    ${produtosFiltrados.map(prod => {
      const c = getCor(prod);
      const temFocoProd = focoAtual[prod] && Object.keys(focoAtual[prod]).length > 0;
      if (!temFocoProd) return "";
      return `<div class="foco-card">
        <div class="foco-card-header" style="background:${c}15;border-bottom:2px solid ${c}">
          <span style="width:10px;height:10px;border-radius:50%;background:${c};display:inline-block"></span>
          ${prod}
        </div>
        <div class="foco-card-body" style="padding-top:12px">
          ${FRENTES_FOCO.map(frente => {
            const obj = focoAtual[prod] && focoAtual[prod][frente];
            return `<div class="foco-frente">
              <div class="foco-frente-label">${frente}</div>
              ${obj ? `<div class="foco-frente-valor">${obj}</div>` : `<div class="foco-frente-vazio">Sem foco definido</div>`}
            </div>`;
          }).join("")}
        </div>
      </div>`;
    }).join("")}
  </div>
  ${focoHistorico.length > 0 ? `
  <div class="card" style="margin-top:20px">
    <div class="card-title">Histórico de focos</div>
    ${focoHistorico.slice().reverse().map(h => `
      <div class="historico-item">
        <div class="historico-data">${h.data} — <strong>${h.produto}</strong> / ${h.frente}</div>
        <div>${h.objetivo}</div>
      </div>
    `).join("")}
  </div>` : ""}`}`;
}

function barra(v, t, cor) {
  const p = t > 0 ? Math.round(v/t*100) : 0;
  return `<div class="barra-wrap"><div class="barra-bg"><div class="barra-fill" style="width:${p}%;background:${cor}"></div></div><span class="barra-pct">${p}%</span></div>`;
}

function numBtn(val, label, cor, key, rows) {
  const at = detalheAberto === key;
  return `<div class="num-btn ${at?'ativo':''}" style="color:${cor}" onclick="toggleDetalhe('${key}', ${JSON.stringify(rows).replace(/"/g,'&quot;')})">
    <div class="v" style="color:${cor}">${val}</div>
    <div class="l">${label}</div>
    <div class="d">${at ? '▲ fechar' : '▼ detalhe'}</div>
  </div>`;
}

function tabelaHTML(rows, cols) {
  if (!rows || rows.length === 0) return '<p style="font-size:12px;color:#aaa;padding:8px 0">Nenhum registro.</p>';
  return `<div class="tabela-wrap"><table>
    <thead><tr>${cols.map(c => `<th>${c}</th>`).join("")}</tr></thead>
    <tbody>${rows.map((r,i) => `<tr>${cols.map(c => `<td>${r[c]||"—"}</td>`).join("")}</tr>`).join("")}</tbody>
  </table></div>`;
}

function toggleDetalhe(key, rows) {
  detalheAberto = detalheAberto === key ? null : key;
  renderConteudo();
}

function renderEspelho(rows, cor) {
  const total = rows.length;
  const ok = rows.filter(r => r["Houve discrepância entre legado e LogAI?"] === "Não").length;
  const disc = rows.filter(r => ["Sim","Parcial"].includes(r["Houve discrepância entre legado e LogAI?"])).length;
  const atendeu = rows.filter(r => r["O LogAI atendeu o que você / o cliente precisava?"] === "Sim, completamente").length;
  const parcial = rows.filter(r => r["O LogAI atendeu o que você / o cliente precisava?"] === "Sim, parcialmente").length;
  const nao = rows.filter(r => r["O LogAI atendeu o que você / o cliente precisava?"] === "Não atendeu").length;
  const retestes = rows.filter(r => r["Esse teste é um reteste?"] === "Sim").length;
  const retesteOk = rows.filter(r => r["Esse teste é um reteste?"] === "Sim" && r["Houve discrepância entre legado e LogAI?"] === "Não").length;

  const colsDisc = ["Carimbo de data/hora","Responsável (CS)","Time / Coordenador","Produto","Caso de uso / foco da pesquisa","Pesquisa realizada","Resposta do produto legado","Resposta do LogAI","Houve discrepância entre legado e LogAI?","Descreva a discrepância"];
  const colsObj = ["Carimbo de data/hora","Responsável (CS)","Produto","Pesquisa realizada","O LogAI atendeu o que você / o cliente precisava?","O que ficou faltando ou poderia ser melhor?"];

  const rowsOk = rows.filter(r => r["Houve discrepância entre legado e LogAI?"] === "Não");
  const rowsDisc = rows.filter(r => ["Sim","Parcial"].includes(r["Houve discrepância entre legado e LogAI?"]));
  const rowsAtendeu = rows.filter(r => r["O LogAI atendeu o que você / o cliente precisava?"] === "Sim, completamente");
  const rowsParcial = rows.filter(r => r["O LogAI atendeu o que você / o cliente precisava?"] === "Sim, parcialmente");
  const rowsNao = rows.filter(r => r["O LogAI atendeu o que você / o cliente precisava?"] === "Não atendeu");
  const rowsRet = rows.filter(r => r["Esse teste é um reteste?"] === "Sim");
  const rowsRetOk = rows.filter(r => r["Esse teste é um reteste?"] === "Sim" && r["Houve discrepância entre legado e LogAI?"] === "Não");

  return `
  <div class="card" style="border-top:3px solid ${cor}">
    <div class="card-title">Discrepância — legado vs LogAI</div>
    <div class="nums">
      ${numBtn(total, "total testes", cor, "esp-all", rows)}
      ${numBtn(ok, "alinhados", "#1D9E75", "esp-ok", rowsOk)}
      ${numBtn(disc, "discrepantes", "#D85A30", "esp-disc", rowsDisc)}
    </div>
    ${barra(ok, total, cor)}
    ${detalheAberto && ["esp-all","esp-ok","esp-disc"].includes(detalheAberto) ? tabelaHTML(detalheAberto==="esp-all"?rows:detalheAberto==="esp-ok"?rowsOk:rowsDisc, colsDisc) : ""}
  </div>
  <div class="card" style="border-top:3px solid ${cor}">
    <div class="card-title">Atendimento ao objetivo</div>
    <div class="nums">
      ${numBtn(atendeu, "atendeu", "#1D9E75", "esp-at", rowsAtendeu)}
      ${numBtn(parcial, "parcialmente", "#BA7517", "esp-parc", rowsParcial)}
      ${numBtn(nao, "não atendeu", "#D85A30", "esp-nao", rowsNao)}
    </div>
    ${barra(atendeu, total, cor)}
    ${detalheAberto && ["esp-at","esp-parc","esp-nao"].includes(detalheAberto) ? tabelaHTML(detalheAberto==="esp-at"?rowsAtendeu:detalheAberto==="esp-parc"?rowsParcial:rowsNao, colsObj) : ""}
  </div>
  ${retestes > 0 ? `
  <div class="card" style="border-top:3px solid ${cor}">
    <div class="card-title">Ciclo de correção — retestes</div>
    <div class="nums" style="grid-template-columns:repeat(2,1fr)">
      ${numBtn(retestes, "retestes feitos", cor, "esp-ret", rowsRet)}
      ${numBtn(retesteOk, "problemas resolvidos", "#1D9E75", "esp-retok", rowsRetOk)}
    </div>
    ${barra(retesteOk, retestes, cor)}
    ${detalheAberto && ["esp-ret","esp-retok"].includes(detalheAberto) ? tabelaHTML(detalheAberto==="esp-ret"?rowsRet:rowsRetOk, ["Carimbo de data/hora","Responsável (CS)","Produto","Pesquisa realizada","Houve discrepância entre legado e LogAI?","Esse teste é um reteste?","ID do teste original"]) : ""}
  </div>` : ""}`;
}

function renderDemo(rows, cor) {
  if (rows.length === 0) return '<div class="vazio">Nenhuma demo realizada ainda.</div>';
  const pos = rows.filter(r => r["Reação geral do cliente"] === "Positiva").length;
  const neg = rows.filter(r => r["Reação geral do cliente"] === "Negativa").length;
  const gaps = rows.map(r => r["Gaps ou funcionalidades que o cliente sinalizou"]).filter(Boolean);
  const cols = ["Carimbo de data/hora","Responsável (CS)","Produto demonstrado","Nome do cliente","Caso de uso apresentado","Reação geral do cliente","O que o cliente disse","Gaps ou funcionalidades que o cliente sinalizou","Cliente quer avançar?","Próxima ação combinada"];
  return `
  <div class="card" style="border-top:3px solid ${cor}">
    <div class="card-title">Demos com clientes</div>
    <div class="nums">
      ${numBtn(rows.length, "demos", cor, "demo-all", rows)}
      ${numBtn(pos, "positivas", "#1D9E75", "demo-pos", rows.filter(r=>r["Reação geral do cliente"]==="Positiva"))}
      ${numBtn(neg, "negativas", "#D85A30", "demo-neg", rows.filter(r=>r["Reação geral do cliente"]==="Negativa"))}
    </div>
    ${barra(pos, rows.length, cor)}
    ${gaps.length > 0 ? `<div class="insight"><strong>Gaps sinalizados:</strong> ${gaps.slice(0,3).join(" · ")}${gaps.length>3?` +${gaps.length-3} mais`:""}</div>` : ""}
    ${detalheAberto && ["demo-all","demo-pos","demo-neg"].includes(detalheAberto) ? tabelaHTML(detalheAberto==="demo-all"?rows:detalheAberto==="demo-pos"?rows.filter(r=>r["Reação geral do cliente"]==="Positiva"):rows.filter(r=>r["Reação geral do cliente"]==="Negativa"), cols) : ""}
  </div>`;
}

function renderMigracao(rows, cor) {
  if (rows.length === 0) return '<div class="vazio">Nenhuma migração registrada ainda.</div>';
  const mig = rows.filter(r => r["Status da migração"] === "Concluído").length;
  const and = rows.filter(r => r["Status da migração"] === "Em andamento").length;
  const sus = rows.filter(r => r["Status da migração"] === "Suspenso").length;
  const cols = ["Carimbo de data/hora","Responsável (CS)","Nome do cliente","Produto de origem (de onde está migrando)","Tipo de migração","Status da migração","Motivo da suspensão","Percepção do cliente","Próxima ação"];
  return `
  <div class="card" style="border-top:3px solid ${cor}">
    <div class="card-title">Migração de clientes</div>
    <div class="nums">
      ${numBtn(mig, "concluídos", "#1D9E75", "mig-ok", rows.filter(r=>r["Status da migração"]==="Concluído"))}
      ${numBtn(and, "em andamento", cor, "mig-and", rows.filter(r=>r["Status da migração"]==="Em andamento"))}
      ${numBtn(sus, "suspensos", "#D85A30", "mig-sus", rows.filter(r=>r["Status da migração"]==="Suspenso"))}
    </div>
    ${barra(mig, rows.length, cor)}
    ${detalheAberto && ["mig-ok","mig-and","mig-sus"].includes(detalheAberto) ? tabelaHTML(detalheAberto==="mig-ok"?rows.filter(r=>r["Status da migração"]==="Concluído"):detalheAberto==="mig-and"?rows.filter(r=>r["Status da migração"]==="Em andamento"):rows.filter(r=>r["Status da migração"]==="Suspenso"), cols) : ""}
  </div>`;
}

function renderAtivacao(rows, cor) {
  if (rows.length === 0) return '<div class="vazio">Nenhum cliente novo registrado ainda.</div>';
  const sim = rows.filter(r => r["Ativou o produto?"] === "Sim").length;
  const nao = rows.filter(r => r["Ativou o produto?"] === "Não").length;
  const pesq = rows.filter(r => r["Já realizou pesquisas no LogAI?"] === "Sim").length;
  const cols = ["Carimbo de data/hora","Responsável (CS)","Produto","Nome do cliente","Como chegou","Ativou o produto?","Já realizou pesquisas no LogAI?","Se sim, quantas pesquisas aproximadamente?","Onde o cliente parou ou o que sentiu que faltava","Precisa de acompanhamento esta semana?"];
  return `
  <div class="card" style="border-top:3px solid ${cor}">
    <div class="card-title">Ativação — clientes novos</div>
    <div class="nums">
      ${numBtn(rows.length, "clientes novos", cor, "at-all", rows)}
      ${numBtn(sim, "ativaram", "#1D9E75", "at-sim", rows.filter(r=>r["Ativou o produto?"]==="Sim"))}
      ${numBtn(nao, "não ativaram", "#D85A30", "at-nao", rows.filter(r=>r["Ativou o produto?"]==="Não"))}
    </div>
    ${barra(sim, rows.length, cor)}
    <div class="insight"><strong>Realizaram pesquisas:</strong> ${pesq} de ${rows.length} clientes</div>
    ${detalheAberto && ["at-all","at-sim","at-nao"].includes(detalheAberto) ? tabelaHTML(detalheAberto==="at-all"?rows:detalheAberto==="at-sim"?rows.filter(r=>r["Ativou o produto?"]==="Sim"):rows.filter(r=>r["Ativou o produto?"]==="Não"), cols) : ""}
  </div>`;
}

carregar();
</script>
</body>
</html>
