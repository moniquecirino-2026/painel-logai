<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel LogAI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 12px; color: #888; margin-top: 3px; }
  .btn { padding: 7px 16px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 13px; cursor: pointer; transition: all .15s; }
  .btn:hover { background: #f0f0f0; }
  .btn-primary { background: #7F77DD; color: white; border-color: #7F77DD; }
  .btn-primary:hover { background: #6b63c8; }

  /* Navegação principal */
  .nav-principal { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 2px solid #e8e8e8; padding-bottom: 0; }
  .nav-btn { padding: 10px 20px; border: none; background: none; font-size: 14px; font-weight: 500; color: #aaa; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
  .nav-btn:hover { color: #555; }
  .nav-btn.ativo { color: #7F77DD; border-bottom-color: #7F77DD; }

  /* Cards de forms */
  .forms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .form-card { background: white; border-radius: 12px; border: 1px solid #eee; padding: 18px; display: flex; flex-direction: column; gap: 10px; }
  .form-card-icon { font-size: 24px; }
  .form-card-nome { font-size: 15px; font-weight: 600; }
  .form-card-desc { font-size: 12px; color: #777; line-height: 1.6; flex: 1; }
  .form-card-link { display: inline-block; padding: 7px 16px; border-radius: 20px; border: 1px solid; text-decoration: none; font-size: 12px; font-weight: 600; text-align: center; transition: opacity .15s; }
  .form-card-link:hover { opacity: .8; }

  /* Direcionamento */
  .secao-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .secao-titulo { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .08em; }
  .dir-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .dir-card { background: white; border-radius: 12px; border: 1px solid #eee; overflow: hidden; }
  .dir-card-header { padding: 11px 14px; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .dir-card-body { padding: 8px 14px 14px; }
  .dir-frente { margin-bottom: 10px; }
  .dir-frente:last-child { margin-bottom: 0; }
  .dir-frente-label { font-size: 10px; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
  .dir-frente-valor { font-size: 12px; color: #333; line-height: 1.5; }
  .dir-frente-vazio { font-size: 12px; color: #ddd; font-style: italic; }
  .dir-frente-input { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 6px 8px; font-size: 12px; font-family: inherit; resize: vertical; min-height: 52px; margin-top: 3px; }
  .dir-frente-input:focus { outline: none; border-color: #7F77DD; }
  .dir-vazio { text-align: center; padding: 32px; color: #ccc; font-size: 13px; }
  .historico-wrap { margin-top: 24px; }
  .historico-card { background: white; border-radius: 12px; border: 1px solid #eee; overflow: hidden; }
  .historico-item { padding: 10px 16px; border-bottom: 1px solid #f5f5f5; font-size: 12px; display: flex; gap: 12px; }
  .historico-item:last-child { border-bottom: none; }
  .historico-meta { color: #aaa; white-space: nowrap; min-width: 150px; }

  /* Resultados */
  .filtros { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .filtro-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 12px; cursor: pointer; }
  .tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .tab { padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 12px; cursor: pointer; }
  .resumo { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .resumo-card { background: white; border-radius: 10px; padding: 14px; text-align: center; border: 1px solid #eee; }
  .resumo-card .val { font-size: 24px; font-weight: 600; }
  .resumo-card .lbl { font-size: 11px; color: #888; margin-top: 3px; }
  .card { background: white; border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; border: 1px solid #eee; }
  .card-title { font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
  .nums { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .num-btn { text-align: center; cursor: pointer; padding: 8px 4px; border-radius: 8px; border: 1px solid transparent; transition: all .15s; }
  .num-btn:hover { background: #f5f5f5; }
  .num-btn.ativo { border-color: currentColor; background: #f9f9f9; }
  .num-btn .v { font-size: 24px; font-weight: 600; }
  .num-btn .l { font-size: 11px; color: #888; margin-top: 1px; }
  .num-btn .d { font-size: 10px; color: #ccc; margin-top: 1px; }
  .barra-wrap { display: flex; align-items: center; gap: 8px; }
  .barra-bg { flex: 1; background: #f0f0f0; border-radius: 4px; height: 7px; }
  .barra-fill { height: 7px; border-radius: 4px; transition: width .4s; }
  .barra-pct { font-size: 11px; color: #888; min-width: 32px; }
  .insight { margin-top: 10px; padding: 9px 12px; background: #f8f8f8; border-radius: 8px; font-size: 12px; color: #555; }
  .insight strong { color: #1a1a1a; }
  .tabela-wrap { overflow-x: auto; margin-top: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { text-align: left; padding: 5px 7px; border-bottom: 1px solid #eee; color: #999; font-weight: 600; white-space: nowrap; }
  td { padding: 6px 7px; border-bottom: 1px solid #f5f5f5; vertical-align: top; max-width: 180px; word-break: break-word; }
  tr:nth-child(even) { background: #fafafa; }
  .loading { text-align: center; padding: 40px; color: #aaa; font-size: 13px; }
  .vazio { text-align: center; padding: 28px; color: #bbb; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Painel LogAI</h1>
      <p id="ultima-atualizacao">Carregando...</p>
    </div>
    <button class="btn" onclick="carregar()">↻ Atualizar</button>
  </div>

  <!-- Navegação principal -->
  <div class="nav-principal">
    <button class="nav-btn ativo" onclick="setAba('forms')" id="nav-forms">Forms</button>
    <button class="nav-btn" onclick="setAba('dir')" id="nav-dir">Direcionamento</button>
    <button class="nav-btn" onclick="setAba('result')" id="nav-result">Resultados</button>
  </div>

  <div id="pagina-forms"></div>
  <div id="pagina-dir" style="display:none"></div>
  <div id="pagina-result" style="display:none"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbydFzsnklxyH7_-9tNTma7D5PUZp-UdBrE13OXhXTaXIkdBlT-OtRiWS1I0G5oNYHwqcQ/exec";
const CORES = { "NCM":"#7F77DD","Finance":"#1D9E75","Shipment":"#D85A30","Export":"#BA7517","Trading":"#185FA5","México":"#993556","360":"#0F6E56","LogOS":"#534AB7","Logmanager":"#3C3489" };
const COR_DEF = "#7F77DD";
const ABAS_RESULT = ["Espelho","Demo","Migração","Ativação"];
const PRODUTOS_LISTA = ["NCM","Finance","Shipment","Export","Trading","360","LogOS","Logmanager","México"];
const FRENTES_FOCO = ["Espelho","Demo","Migração","Ativação"];
const FORMS_INFO = [
  { id:"espelho", nome:"Espelho", icone:"🪞", cor:"#1D9E75", url:"https://forms.gle/jQaG9qbDubF53z1i9",
    desc:"Todas as consultas que o time faz no produto legado e replica no LogAI. Não precisam ter um foco específico — o objetivo é construir o backlog de dados e identificar discrepâncias." },
  { id:"demo", nome:"Demo", icone:"🤝", cor:"#7F77DD", url:"https://forms.gle/hweej1hHV8xaeoeq9",
    desc:"Preencher após cada demonstração do LogAI para um cliente. Registra reação, feedback e gaps identificados durante a apresentação." },
  { id:"migracao", nome:"Migração", icone:"🔄", cor:"#BA7517", url:"https://forms.gle/ugKFwpVTR8Urr4DZA",
    desc:"Acompanhamento do processo de migração de clientes do produto legado para o LogAI. Atualizar sempre que houver mudança de status." },
  { id:"ativacao", nome:"Ativação", icone:"🚀", cor:"#185FA5", url:"https://forms.gle/CQRpx7TgGstv6iTTA",
    desc:"Acompanhamento semanal de clientes novos. Registrar se ativou, se realizou pesquisas e a percepção do cliente naquela semana." },
];

let dadosTodos = {};
let focoAtual = {};
let focoHistorico = [];
let modoEdicao = false;
let abaAtiva = "forms";
let produtoAtivo = "Todos";
let frenteAtiva = "Espelho";
let detalheAberto = null;
let salvando = false;

function getCor(p) {
  if (!p || p === "Todos") return COR_DEF;
  if (p.startsWith("NCM")) return CORES["NCM"] || COR_DEF;
  return CORES[p] || COR_DEF;
}
function normalizarProduto(p) {
  if (!p) return p;
  if (p.startsWith("NCM")) return "NCM";
  return p;
}

async function buscarAba(aba) {
  const r = await fetch(`${API}?aba=${encodeURIComponent(aba)}`);
  const j = await r.json();
  return Array.isArray(j) ? j : [];
}

async function carregar() {
  document.getElementById("ultima-atualizacao").textContent = "Atualizando...";
  try {
    const abas = [...ABAS_RESULT, "Direcionamento"];
    const res = await Promise.all(abas.map(a => buscarAba(a).catch(() => [])));
    abas.forEach((a, i) => dadosTodos[a] = res[i] || []);
    focoAtual = {}; focoHistorico = [];
    (dadosTodos["Direcionamento"] || []).forEach(r => {
      const { Produto: prod, Frente: frente, Objetivo: obj, Data: data } = r;
      if (prod && frente && obj) {
        if (!focoAtual[prod]) focoAtual[prod] = {};
        focoAtual[prod][frente] = obj;
        focoHistorico.push({ produto: prod, frente, objetivo: obj, data });
      }
    });
    document.getElementById("ultima-atualizacao").textContent = `Atualizado às ${new Date().toLocaleTimeString("pt-BR")}`;
    renderAba();
  } catch(e) {
    document.getElementById("ultima-atualizacao").textContent = "Erro ao carregar";
  }
}

function setAba(aba) {
  abaAtiva = aba;
  ["forms","dir","result"].forEach(a => {
    document.getElementById(`pagina-${a}`).style.display = a === aba ? "block" : "none";
    document.getElementById(`nav-${a}`).classList.toggle("ativo", a === aba);
  });
  renderAba();
}

function renderAba() {
  if (abaAtiva === "forms") renderForms();
  else if (abaAtiva === "dir") renderDirecionamento();
  else if (abaAtiva === "result") { renderFiltros(); renderTabs(); renderResultado(); }
}

// ── ABA FORMS ──────────────────────────────────────────────
function renderForms() {
  document.getElementById("pagina-forms").innerHTML = `
    <div class="forms-grid">
      ${FORMS_INFO.map(f => `
        <div class="form-card" style="border-top:3px solid ${f.cor}">
          <div class="form-card-icon">${f.icone}</div>
          <div class="form-card-nome">${f.nome}</div>
          <div class="form-card-desc">${f.desc}</div>
          <a href="${f.url}" target="_blank" class="form-card-link" style="border-color:${f.cor};color:${f.cor};background:${f.cor}12">Abrir form →</a>
        </div>
      `).join("")}
    </div>`;
}

// ── ABA DIRECIONAMENTO ─────────────────────────────────────
function toggleEdicao() {
  modoEdicao = !modoEdicao;
  renderDirecionamento();
}

async function salvarFoco() {
  if (salvando) return;
  salvando = true;
  const btn = document.getElementById("btn-salvar-foco");
  if (btn) btn.textContent = "Salvando...";
  const novoFoco = {};
  PRODUTOS_LISTA.forEach(prod => {
    FRENTES_FOCO.forEach(frente => {
      const el = document.getElementById(`fi-${prod}-${frente}`);
      if (el && el.value.trim()) {
        if (!novoFoco[prod]) novoFoco[prod] = {};
        novoFoco[prod][frente] = el.value.trim();
      }
    });
  });
  const agora = new Date().toLocaleDateString("pt-BR");
  const linhas = [];
  focoHistorico.forEach(h => {
    const novo = novoFoco[h.produto]?.[h.frente];
    if (!novo || novo === h.objetivo) linhas.push({ Produto: h.produto, Frente: h.frente, Objetivo: h.objetivo, Data: h.data });
  });
  Object.entries(novoFoco).forEach(([prod, frentes]) => {
    Object.entries(frentes).forEach(([frente, obj]) => {
      if (!focoHistorico.find(h => h.produto === prod && h.frente === frente && h.objetivo === obj))
        linhas.push({ Produto: prod, Frente: frente, Objetivo: obj, Data: agora });
    });
  });
  try {
    await fetch(`${API}?acao=salvarFoco&dados=${encodeURIComponent(JSON.stringify(linhas))}`);
    focoAtual = novoFoco;
    focoHistorico = linhas.map(l => ({ produto: l.Produto, frente: l.Frente, objetivo: l.Objetivo, data: l.Data }));
    modoEdicao = false; salvando = false;
    renderDirecionamento();
  } catch(e) {
    salvando = false;
    if (btn) btn.textContent = "Erro — tentar novamente";
  }
}

function renderDirecionamento() {
  const el = document.getElementById("pagina-dir");
  const temFoco = Object.keys(focoAtual).length > 0;
  const produtosComFoco = PRODUTOS_LISTA.filter(p => focoAtual[p] && Object.keys(focoAtual[p]).length > 0);

  if (modoEdicao) {
    el.innerHTML = `
      <div class="secao-header">
        <span class="secao-titulo">Editando foco da semana</span>
        <div style="display:flex;gap:8px">
          <button class="btn" onclick="toggleEdicao()">Cancelar</button>
          <button class="btn btn-primary" id="btn-salvar-foco" onclick="salvarFoco()">Salvar</button>
        </div>
      </div>
      <div class="dir-grid">
        ${PRODUTOS_LISTA.map(prod => {
          const c = getCor(prod);
          return `<div class="dir-card">
            <div class="dir-card-header" style="background:${c}12;border-bottom:2px solid ${c}">
              <span style="width:9px;height:9px;border-radius:50%;background:${c};display:inline-block;flex-shrink:0"></span>
              ${prod}
            </div>
            <div class="dir-card-body">
              ${FRENTES_FOCO.map(frente => `
                <div class="dir-frente">
                  <div class="dir-frente-label">${frente}</div>
                  <textarea class="dir-frente-input" id="fi-${prod}-${frente}" placeholder="Objetivo para ${frente}...">${focoAtual[prod]?.[frente] || ""}</textarea>
                </div>`).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>`;
    return;
  }

  el.innerHTML = `
    <div class="secao-header">
      <span class="secao-titulo">Foco da semana</span>
      <button class="btn btn-primary" onclick="toggleEdicao()" style="font-size:12px;padding:5px 14px">✏️ Editar</button>
    </div>
    ${!temFoco
      ? `<div class="dir-vazio">Nenhum foco definido ainda. Clique em "✏️ Editar" para começar.</div>`
      : `<div class="dir-grid">
          ${produtosComFoco.map(prod => {
            const c = getCor(prod);
            return `<div class="dir-card">
              <div class="dir-card-header" style="background:${c}12;border-bottom:2px solid ${c}">
                <span style="width:9px;height:9px;border-radius:50%;background:${c};display:inline-block;flex-shrink:0"></span>
                ${prod}
              </div>
              <div class="dir-card-body">
                ${FRENTES_FOCO.map(frente => {
                  const obj = focoAtual[prod]?.[frente];
                  return `<div class="dir-frente">
                    <div class="dir-frente-label">${frente}</div>
                    ${obj ? `<div class="dir-frente-valor">${obj}</div>` : `<div class="dir-frente-vazio">Sem foco definido</div>`}
                  </div>`;
                }).join("")}
              </div>
            </div>`;
          }).join("")}
        </div>
        ${focoHistorico.length > 0 ? `
        <div class="historico-wrap">
          <div style="font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Histórico</div>
          <div class="historico-card">
            ${focoHistorico.slice().reverse().slice(0,10).map(h => `
              <div class="historico-item">
                <div class="historico-meta">${h.data} · <strong>${h.produto}</strong> / ${h.frente}</div>
                <div style="font-size:12px;color:#333">${h.objetivo}</div>
              </div>`).join("")}
          </div>
        </div>` : ""}
      `}`;
}

// ── ABA RESULTADOS ─────────────────────────────────────────
function getProdutos() {
  const s = new Set();
  ABAS_RESULT.forEach(a => (dadosTodos[a] || []).forEach(r => { if(r["Produto"]) s.add(normalizarProduto(r["Produto"])); }));
  return ["Todos", ...s];
}
function filtrar(rows) {
  if (produtoAtivo === "Todos") return rows;
  if (produtoAtivo === "NCM") return rows.filter(r => r["Produto"] && r["Produto"].startsWith("NCM"));
  return rows.filter(r => r["Produto"] === produtoAtivo);
}
function renderFiltros() {
  document.getElementById("filtros-produto").innerHTML = getProdutos().map(p => {
    const c = getCor(p); const at = p === produtoAtivo;
    return `<button class="filtro-btn" onclick="setProduto('${p}')" style="${at?`border-color:${c};background:${c}18;color:${c};font-weight:600`:''}">${p}</button>`;
  }).join("");
}
function renderTabs() {
  document.getElementById("tabs-frente").innerHTML = ABAS_RESULT.map(a => {
    const at = a === frenteAtiva; const c = getCor(produtoAtivo);
    return `<button class="tab" onclick="setFrente('${a}')" style="${at?`border-color:${c};background:${c}18;color:${c};font-weight:600`:''}">${a}</button>`;
  }).join("");
}
function setProduto(p) { produtoAtivo = p; detalheAberto = null; renderFiltros(); renderTabs(); renderResultado(); }
function setFrente(f) { frenteAtiva = f; detalheAberto = null; renderTabs(); renderResultado(); }

function renderResultado() {
  const rows = filtrar(dadosTodos[frenteAtiva] || []);
  const cor = getCor(produtoAtivo);
  const total = rows.length;
  const prods = new Set(rows.map(r => normalizarProduto(r["Produto"])).filter(Boolean)).size;
  const totalG = produtoAtivo === "Todos"
    ? ABAS_RESULT.reduce((a,b) => a + (dadosTodos[b]||[]).length, 0)
    : ABAS_RESULT.reduce((a,b) => a + filtrar(dadosTodos[b]||[]).length, 0);

  document.getElementById("resumo").innerHTML = `
    <div class="resumo-card"><div class="val">${total}</div><div class="lbl">Registros nesta frente</div></div>
    <div class="resumo-card"><div class="val" style="color:${cor}">${prods}</div><div class="lbl">Produtos nesta frente</div></div>
    <div class="resumo-card"><div class="val">${totalG}</div><div class="lbl">Total em todas as frentes</div></div>`;

  let html = "";
  if (frenteAtiva === "Espelho") html = renderEspelho(rows, cor);
  else if (frenteAtiva === "Demo") html = renderDemo(rows, cor);
  else if (frenteAtiva === "Migração") html = renderMigracao(rows, cor);
  else if (frenteAtiva === "Ativação") html = renderAtivacao(rows, cor);
  document.getElementById("conteudo-resultado").innerHTML = html || '<div class="vazio">Nenhum registro ainda.</div>';
}

function barra(v, t, cor) {
  const p = t > 0 ? Math.round(v/t*100) : 0;
  return `<div class="barra-wrap"><div class="barra-bg"><div class="barra-fill" style="width:${p}%;background:${cor}"></div></div><span class="barra-pct">${p}%</span></div>`;
}
function numBtn(val, label, cor, key, rows) {
  const at = detalheAberto === key;
  return `<div class="num-btn ${at?'ativo':''}" onclick="toggleDetalhe('${key}',${JSON.stringify(rows).replace(/"/g,'&quot;')})">
    <div class="v" style="color:${cor}">${val}</div><div class="l">${label}</div><div class="d">${at?'▲':'▼'}</div>
  </div>`;
}
function tabelaHTML(rows, cols) {
  if (!rows || !rows.length) return '<p style="font-size:12px;color:#bbb;padding:6px 0">Nenhum registro.</p>';
  return `<div class="tabela-wrap"><table>
    <thead><tr>${cols.map(c=>`<th>${c}</th>`).join("")}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${r[c]||"—"}</td>`).join("")}</tr>`).join("")}</tbody>
  </table></div>`;
}
function toggleDetalhe(key, rows) {
  detalheAberto = detalheAberto === key ? null : key;
  renderResultado();
}

function renderEspelho(rows, cor) {
  if (!rows.length) return '<div class="vazio">Nenhum teste espelho ainda.</div>';
  const ok=rows.filter(r=>r["Houve discrepância entre legado e LogAI?"]==="Não").length;
  const disc=rows.filter(r=>["Sim","Parcial"].includes(r["Houve discrepância entre legado e LogAI?"])).length;
  const at=rows.filter(r=>r["O LogAI atendeu o que você / o cliente precisava?"]==="Sim, completamente").length;
  const parc=rows.filter(r=>r["O LogAI atendeu o que você / o cliente precisava?"]==="Sim, parcialmente").length;
  const nao=rows.filter(r=>r["O LogAI atendeu o que você / o cliente precisava?"]==="Não atendeu").length;
  const ret=rows.filter(r=>r["Esse teste é um reteste?"]==="Sim").length;
  const retOk=rows.filter(r=>r["Esse teste é um reteste?"]==="Sim"&&r["Houve discrepância entre legado e LogAI?"]==="Não").length;
  const cD=["Carimbo de data/hora","Responsável (CS)","Time / Coordenador","Produto","Caso de uso / foco da pesquisa","Pesquisa realizada","Resposta do produto legado","Resposta do LogAI","Houve discrepância entre legado e LogAI?","Descreva a discrepância"];
  const cO=["Carimbo de data/hora","Responsável (CS)","Produto","Pesquisa realizada","O LogAI atendeu o que você / o cliente precisava?","O que ficou faltando ou poderia ser melhor?"];
  const rOk=rows.filter(r=>r["Houve discrepância entre legado e LogAI?"]==="Não");
  const rDi=rows.filter(r=>["Sim","Parcial"].includes(r["Houve discrepância entre legado e LogAI?"]));
  const rAt=rows.filter(r=>r["O LogAI atendeu o que você / o cliente precisava?"]==="Sim, completamente");
  const rPa=rows.filter(r=>r["O LogAI atendeu o que você / o cliente precisava?"]==="Sim, parcialmente");
  const rNa=rows.filter(r=>r["O LogAI atendeu o que você / o cliente precisava?"]==="Não atendeu");
  const rRe=rows.filter(r=>r["Esse teste é um reteste?"]==="Sim");
  const rRO=rows.filter(r=>r["Esse teste é um reteste?"]==="Sim"&&r["Houve discrepância entre legado e LogAI?"]==="Não");
  return `
  <div class="card" style="border-top:3px solid ${cor}">
    <div class="card-title">Discrepância — legado vs LogAI</div>
    <div class="nums">${numBtn(rows.length,"total",cor,"ea",rows)}${numBtn(ok,"alinhados","#1D9E75","eo",rOk)}${numBtn(disc,"discrepantes","#D85A30","ed",rDi)}</div>
    ${barra(ok,rows.length,cor)}
    ${detalheAberto&&["ea","eo","ed"].includes(detalheAberto)?tabelaHTML(detalheAberto==="ea"?rows:detalheAberto==="eo"?rOk:rDi,cD):""}
  </div>
  <div class="card" style="border-top:3px solid ${cor}">
    <div class="card-title">Atendimento ao objetivo</div>
    <div class="nums">${numBtn(at,"atendeu","#1D9E75","eat",rAt)}${numBtn(parc,"parcialmente","#BA7517","ep",rPa)}${numBtn(nao,"não atendeu","#D85A30","en",rNa)}</div>
    ${barra(at,rows.length,cor)}
    ${detalheAberto&&["eat","ep","en"].includes(detalheAberto)?tabelaHTML(detalheAberto==="eat"?rAt:detalheAberto==="ep"?rPa:rNa,cO):""}
  </div>
  ${ret>0?`<div class="card" style="border-top:3px solid ${cor}">
    <div class="card-title">Ciclo de correção — retestes</div>
    <div class="nums" style="grid-template-columns:repeat(2,1fr)">${numBtn(ret,"retestes",cor,"er",rRe)}${numBtn(retOk,"resolvidos","#1D9E75","erk",rRO)}</div>
    ${barra(retOk,ret,cor)}
    ${detalheAberto&&["er","erk"].includes(detalheAberto)?tabelaHTML(detalheAberto==="er"?rRe:rRO,["Carimbo de data/hora","Responsável (CS)","Produto","Pesquisa realizada","Houve discrepância entre legado e LogAI?","ID do teste original"]):""}
  </div>`:""}`;
}

function renderDemo(rows, cor) {
  if (!rows.length) return '<div class="vazio">Nenhuma demo realizada ainda.</div>';
  const pos=rows.filter(r=>r["Reação geral do cliente"]==="Positiva").length;
  const neg=rows.filter(r=>r["Reação geral do cliente"]==="Negativa").length;
  const gaps=rows.map(r=>r["Gaps ou funcionalidades que o cliente sinalizou"]).filter(Boolean);
  const cols=["Carimbo de data/hora","Responsável (CS)","Nome do Cliente","ID do Cliente","Produto atual do cliente","Caso de uso apresentado","Reação geral do cliente","O que o cliente disse","Gaps ou funcionalidades que o cliente sinalizou","Cliente quer avançar?","Próxima ação combinada","Link da gravação Meetrox"];
  const rP=rows.filter(r=>r["Reação geral do cliente"]==="Positiva");
  const rN=rows.filter(r=>r["Reação geral do cliente"]==="Negativa");
  return `<div class="card" style="border-top:3px solid ${cor}">
    <div class="card-title">Demos com clientes</div>
    <div class="nums">${numBtn(rows.length,"demos",cor,"da",rows)}${numBtn(pos,"positivas","#1D9E75","dp",rP)}${numBtn(neg,"negativas","#D85A30","dn",rN)}</div>
    ${barra(pos,rows.length,cor)}
    ${gaps.length>0?`<div class="insight"><strong>Gaps:</strong> ${gaps.slice(0,3).join(" · ")}${gaps.length>3?` +${gaps.length-3} mais`:""}</div>`:""}
    ${detalheAberto&&["da","dp","dn"].includes(detalheAberto)?tabelaHTML(detalheAberto==="da"?rows:detalheAberto==="dp"?rP:rN,cols):""}
  </div>`;
}

function renderMigracao(rows, cor) {
  if (!rows.length) return '<div class="vazio">Nenhuma migração registrada ainda.</div>';
  const mig=rows.filter(r=>r["Status da migração"]==="Concluído").length;
  const and=rows.filter(r=>r["Status da migração"]==="Em andamento").length;
  const sus=rows.filter(r=>r["Status da migração"]==="Suspenso").length;
  const cols=["Carimbo de data/hora","Responsável (CS)","ID do Cliente","Nome do Cliente","Produto de origem (de onde está migrando)","Tipo de Migração","Status da migração","Motivo da suspensão","Percepção do cliente","Próxima ação"];
  const rM=rows.filter(r=>r["Status da migração"]==="Concluído");
  const rA=rows.filter(r=>r["Status da migração"]==="Em andamento");
  const rS=rows.filter(r=>r["Status da migração"]==="Suspenso");
  return `<div class="card" style="border-top:3px solid ${cor}">
    <div class="card-title">Migração de clientes</div>
    <div class="nums">${numBtn(mig,"concluídos","#1D9E75","mc",rM)}${numBtn(and,"em andamento",cor,"ma",rA)}${numBtn(sus,"suspensos","#D85A30","ms",rS)}</div>
    ${barra(mig,rows.length,cor)}
    ${detalheAberto&&["mc","ma","ms"].includes(detalheAberto)?tabelaHTML(detalheAberto==="mc"?rM:detalheAberto==="ma"?rA:rS,cols):""}
  </div>`;
}

function renderAtivacao(rows, cor) {
  if (!rows.length) return '<div class="vazio">Nenhum cliente novo registrado ainda.</div>';
  const sim=rows.filter(r=>r["Ativou o produto Log.AI?"]==="Sim").length;
  const nao=rows.filter(r=>r["Ativou o produto Log.AI?"]==="Não").length;
  const pesq=rows.filter(r=>r["Já realizou pesquisas no LogAI essa semana?"]==="Sim").length;
  const cols=["Carimbo de data/hora","Responsável (CS)","ID do Cliente","Nome do Cliente","Agente contratado no Log.AI","Ativou o produto Log.AI?","Já realizou pesquisas no LogAI essa semana?","Existe algum feedback do cliente sobre o Log.AI essa semana?","Precisa de acompanhamento esta semana?"];
  const rS=rows.filter(r=>r["Ativou o produto Log.AI?"]==="Sim");
  const rN=rows.filter(r=>r["Ativou o produto Log.AI?"]==="Não");
  return `<div class="card" style="border-top:3px solid ${cor}">
    <div class="card-title">Ativação — clientes novos</div>
    <div class="nums">${numBtn(rows.length,"clientes",cor,"aa",rows)}${numBtn(sim,"ativaram","#1D9E75","as",rS)}${numBtn(nao,"não ativaram","#D85A30","an",rN)}</div>
    ${barra(sim,rows.length,cor)}
    <div class="insight"><strong>Realizaram pesquisas esta semana:</strong> ${pesq} de ${rows.length} clientes</div>
    ${detalheAberto&&["aa","as","an"].includes(detalheAberto)?tabelaHTML(detalheAberto==="aa"?rows:detalheAberto==="as"?rS:rN,cols):""}
  </div>`;
}

  <div class="tabs" id="tabs-frente"></div>
  <div id="resumo" class="resumo"></div>
  <div id="conteudo-resultado"></div>`;
